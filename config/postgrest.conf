# PostgREST — RetailEX REST API
# Çalıştırma: postgrest config/postgrest.conf
# veya: PGRST_DB_URI="..." postgrest config/postgrest.conf

# Veritabanı bağlantısı — ortam değişkeni PGRST_DB_URI ile override edin.
# Güvenlik: Gerçek şifreyi bu dosyaya yazmayın; PGRST_DB_URI env var kullanın.
# Örnek: PGRST_DB_URI="postgres://postgres:SIFRE@127.0.0.1:5432/retailex_local" postgrest config/postgrest.conf
db-uri = "postgres://postgres:postgres@127.0.0.1:5432/retailex_local"

# İstemci kimlik doğrulama yokken kullanılacak rol (anon veya postgres)
db-anon-role = "anon"

# REST ile açılacak şemalar (RetailEX: public, logic, wms, rest, beauty, pos, logistics)
db-schemas = "public,logic,wms,rest,beauty,pos,logistics"

# HTTP sunucu portu (pg_bridge 3001 kullandığı için 3002)
server-port = 3002

# Dışarıdan erişim için portun tüm arayüzlere bind edilmesi gerekir.
server-host = "0.0.0.0"

# Web (browser) tarafında IP üzerinden çağrımda CORS engelini aşmak için.
# Gerekirse production'da sadece kendi origin'larınızı whitelist yapın.
server-cors-allowed-origins = "*"

# İsteğe bağlı: JWT ile kimlik doğrulama (production için önerilir)
# jwt-secret = "env:PGRST_JWT_SECRET"
# jwt-secret-is-base64 = false

# API açıklaması (OpenAPI)
# openapi-mode = "disabled"
# openapi-server-proxy-uri = "http://localhost:3002"
