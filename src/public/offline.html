<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çevrimdışı — Asin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Figtree', system-ui, sans-serif;
      background: #0E2433;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F3F5F7;
      padding: 24px;
    }

    .container { text-align: center; max-width: 500px; }

    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 28px;
      filter: drop-shadow(0 8px 24px rgba(31, 168, 160, 0.35));
    }

    h1 {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.88;
      margin-bottom: 28px;
      color: #D5F0EE;
    }

    .status {
      background: rgba(31, 168, 160, 0.12);
      border: 1px solid rgba(31, 168, 160, 0.35);
      border-radius: 12px;
      padding: 14px 22px;
      margin-bottom: 22px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .status-icon {
      width: 10px;
      height: 10px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .retry-btn {
      background: #1FA8A0;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, background 0.2s;
    }

    .retry-btn:hover { background: #178f88; transform: translateY(-1px); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      p { font-size: 15px; }
      .logo { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="logo" viewBox="0 0 512 512" role="img" aria-label="Asin">
      <defs>
        <linearGradient id="offlineAsin" x1="8%" y1="0%" x2="92%" y2="100%">
          <stop offset="0%" stop-color="#F3F5F7"/>
          <stop offset="100%" stop-color="#1FA8A0"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="112" fill="#0E2433"/>
      <path d="M256 72 L420 168 L420 344 L256 440 L92 344 L92 168 Z" fill="none" stroke="#1FA8A0" stroke-width="14" stroke-linejoin="round" opacity="0.9"/>
      <path d="M256 140 L360 372 H318 L292 312 H220 L194 372 H152 L256 140 Z M232 268 H280 L256 212 Z" fill="url(#offlineAsin)"/>
      <rect x="372" y="196" width="28" height="120" rx="10" fill="#1FA8A0"/>
    </svg>

    <h1>İnternet bağlantısı yok</h1>
    <p>
      Asin’e erişmek için bağlantınızı kontrol edin.
      Bağlantı geldiğinde sayfa yeniden yüklenebilir.
    </p>

    <div class="status">
      <div class="status-icon"></div>
      <span>Çevrimdışı</span>
    </div>

    <button class="retry-btn" type="button" onclick="location.reload()">Tekrar dene</button>
  </div>

  <script>
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
