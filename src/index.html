  <style>
    /* PWA Splash Screen Stilleri */
    #pwa-splash {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      transition: opacity 0.3s ease-out;
    }
    
    #pwa-splash.loaded {
      opacity: 0;
      pointer-events: none;
    }
    
    .splash-logo {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      font-weight: bold;
      color: #2563eb;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .splash-title {
      color: white;
      font-size: 32px;
      font-weight: bold;
      font-family: system-ui, -apple-system, sans-serif;
      margin-bottom: 8px;
    }
    
    .splash-subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      margin-bottom: 32px;
    }
    
    .splash-loader {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    /* Standalone mod için özel stiller */
    .pwa-standalone {
      --safe-area-inset-top: env(safe-area-inset-top);
      --safe-area-inset-bottom: env(safe-area-inset-bottom);
      --safe-area-inset-left: env(safe-area-inset-left);
      --safe-area-inset-right: env(safe-area-inset-right);
    }
    
    .pwa-standalone body {
      padding-top: var(--safe-area-inset-top);
      padding-bottom: var(--safe-area-inset-bottom);
      padding-left: var(--safe-area-inset-left);
      padding-right: var(--safe-area-inset-right);
</head>
<body>
  <!-- React Root -->
  <div id="root"></div>

  <!-- PWA Service Worker Registration -->
  <script src="/sw-register.js"></script>
    // Offline/Online durumu göster
    window.addEventListener('load', () => {
      function updateOnlineStatus() {
        const status = navigator.onLine ? 'online' : 'offline';
        document.body.setAttribute('data-network-status', status);
        
        if (!navigator.onLine) {
          console.warn('[PWA] Çevrimdışı modda çalışıyorsunuz');
        }
      }
      
      window.addEventListener('online', updateOnlineStatus);
      window.addEventListener('offline', updateOnlineStatus);
      updateOnlineStatus();
    });
  </script>
  
  <!-- NoScript Fallback -->
  <noscript>
    <div style="
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #1e40af;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      text-align: center;
    ">
      <div>
        <h1 style="font-size: 32px; margin-bottom: 16px;">⚠️ JavaScript Gerekli</h1>
        <p style="font-size: 18px; opacity: 0.9;">
          RetailOS uygulamasını kullanmak için lütfen tarayıcınızda JavaScript'i etkinleştirin.
        </p>
      </div>
    </div>
  </noscript>
</body>
