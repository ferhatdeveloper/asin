version: "3.9"

# Dokploy / Docker Compose — RetailEX SaaS yığını
#
# ⚠ Dokploy sarıda kalıyorsa: varsayılan `up -d --build` 16 sync + frontend paralel build eder.
#    Compose Command → bash database/scripts/dokploy-deploy.sh
#    Ayrıntı: database/DOKPLOY_SARIDA_KALMA.md
#
# WhatsApp QR köprüsü: retailex_whatsapp_bridge + retailex_frontend (nginx /__wa_bridge).
# WebSocket senkron: sync_{kiracı} + Caddy /{kiracı}/ws ve /{kiracı}/sync (075 migration gerekli).
#
# Dokploy Redeploy (tam stack): 16 sync + postgrest + frontend — 5–15 dk sürebilir;
#   Vite "rendering chunks" aşamasında 2–4 GB RAM gerekir. Sarıda kalırsa:
#   - Dokploy log sonunda OOM/killed var mı bakın
#   - Yalnız UI: POSTGRES_PASSWORD='...' bash database/scripts/dokploy-redeploy-frontend.sh
#   - Ortam: COMPOSE_PARALLEL_LIMIT=2 (paralel build sınırı)
#
# main'e push sonrası Dokploy'da Redeploy veya:
#   POSTGRES_PASSWORD='...' bash database/scripts/dokploy-redeploy-sync.sh
#
# Veri güvenliği: Bu dosya volume adlarını veya postgres veri dizinini değiştirmez;
# yalnızca ortam değişkenleri ve servis tanımlarıdır. Mevcut named volume’lar
# (örn. saas_postgres_data) aynı isimle kalır; silinmedikçe DB verisi korunur.
#
# pg_bridge + tarayıcıdan “PostgreSQL tam yedek”:
#   1) retailex_bridge: PG_DUMP_TOKEN (runtime) — boşsa /api/pg_dump korumasız kalır (önerilmez).
#   2) retailex_frontend build: VITE_PG_DUMP_TOKEN — PG_DUMP_TOKEN ile AYNI olmalı (Dokploy’da
#      frontend image build arg / secret olarak aynı değeri verin).
#   3) İsteğe bağlı: PG_DUMP_PATH (Alpine’da genelde boş; pg_dump zaten client paketinde).
#   4) SaaS / PostgREST: tarayıcı api.*:443 ile pg_dump yapılamaz. Köprüde PG_DUMP_INTERNAL_URI
#      (örn. postgres://postgres:PAROLA@postgres:5432) + isteğe PG_DUMP_ALLOWED_DBS — uygulama otomatik
#      /api/pg_dump_internal kullanır (VITE_PG_DUMP_INTERNAL=0 ile kapatılabilir).
#
# Örnek isimler: kökte .env.example ve docker/dokploy.env.example
#
# pg_bridge ortamı — Dokploy’da “Environment” veya “Secrets” ile aynı isimleri doldurun
x-bridge-env: &bridge-env
  NODE_ENV: production
  # Dinleme portu (Dockerfile EXPOSE ve Nginx upstream ile uyumlu)
  BRIDGE_PORT: ${BRIDGE_PORT:-3001}
  # Tam yedek /api/pg_dump: tanımlıysa Bearer / ?token= / body.token zorunlu (üretimde önerilir)
  PG_DUMP_TOKEN: ${PG_DUMP_TOKEN:-}
  # pg_dump tam yolu (Alpine’da genelde gerekmez); özel kurulumda örn. /usr/lib/postgresql/17/bin/pg_dump
  PG_DUMP_PATH: ${PG_DUMP_PATH:-}
  # Caller ID webhook / poll koruması (isteğe bağlı)
  CALLER_ID_PUSH_TOKEN: ${CALLER_ID_PUSH_TOKEN:-}
  # Paket servis push (isteğe bağlı)
  DELIVERY_PUSH_TOKEN: ${DELIVERY_PUSH_TOKEN:-}
  # PostgREST ile aynı Docker postgres — /api/pg_dump_internal (tarayıcıdan api:443 TLS hatasını önler)
  PG_DUMP_INTERNAL_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432
  # İsteğe bağlı: yalnız listelenen DB adlarına izin (virgülle). Boş = güvenli isim kalıbı yeterli.
  PG_DUMP_ALLOWED_DBS: ${PG_DUMP_ALLOWED_DBS:-}

x-postgrest-env: &postgrest-env
  PGRST_DB_ANON_ROLE: anon
  PGRST_DB_SCHEMAS: "public,logic,wms,rest,beauty,pos,logistics"
  PGRST_SERVER_HOST: "0.0.0.0"
  PGRST_SERVER_PORT: "3000"
  PGRST_SERVER_CORS_ALLOWED_ORIGINS: "*"

x-sync-env: &sync-env
  BIND_ADDRESS: 0.0.0.0:8080
  RUST_LOG: retailex_sync_service=info,tower_http=info

x-sync-service: &sync-service
  build:
    context: .
    dockerfile: Dockerfile.sync-service
  image: retailex-sync-service:latest
  restart: always
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    <<: *sync-env
  networks:
    - berqenas_net

services:
  api_gateway:
    image: caddy:2.8-alpine
    container_name: retailex_api_gateway
    restart: always
    depends_on:
      - postgrest_merkez
      - postgrest_aqua_beauty
      - postgrest_berzin_com
      - postgrest_kasap
      - postgrest_testere
      - postgrest_mettu
      - postgrest_canon
      - postgrest_lovan
      - postgrest_zetem
      - postgrest_ferhat
      - postgrest_ozbek
      - sync_lovan
      - sync_zetem
      - sync_ferhat
      - sync_ozbek
    volumes:
      - ./database/docker/Caddyfile.api-gateway:/etc/caddy/Caddyfile:ro
    networks:
      - berqenas_net

  postgres:
    image: postgres:17
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    # Dokploy'da internal network yeterli; host port acmak isterseniz:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - saas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      berqenas_net:
        aliases:
          - postgres
          - saas_postgres

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: saas_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@retailex.app}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_this_password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - saas_pgadmin_data:/var/lib/pgadmin
    networks:
      - berqenas_net

  retailex_bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: retailex-bridge:latest
    container_name: retailex_bridge
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *bridge-env
    networks:
      - berqenas_net

  retailex_whatsapp_bridge:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp-bridge
    image: retailex-whatsapp-bridge:latest
    container_name: retailex_whatsapp_bridge
    restart: always
    environment:
      WA_BRIDGE_PORT: "3000"
      WA_BRIDGE_BIND: "0.0.0.0"
      WA_BRIDGE_TOKEN: ${WA_BRIDGE_TOKEN:-}
      WA_BRIDGE_AUTH_DIR: /data/.wa-auth
    volumes:
      - retailex_wa_bridge_data:/data
    networks:
      - berqenas_net

  retailex_frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BRIDGE_URL: ""
        VITE_MERKEZ_REST_URL: ${VITE_MERKEZ_REST_URL:-https://api.retailex.app/merkez}
        # 1 = yalnız köprü iç pg_dump; 0 = yalnız harici connStr; boş = otomatik (api:443 / PostgREST → iç)
        VITE_PG_DUMP_INTERNAL: ${VITE_PG_DUMP_INTERNAL:-}
    image: retailex-web:latest
    container_name: retailex_frontend
    restart: always
    ports:
      - "${RETAILEX_WEB_PORT:-8080}:80"
    depends_on:
      - retailex_bridge
      - retailex_whatsapp_bridge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - berqenas_net

  postgrest_merkez:
    image: postgrest/postgrest:v12.2.0
    container_name: saas_postgrest_merkez
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *postgrest-env
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/merkez_db
    ports:
      - "${POSTGREST_PORT_MERKEZ:-3002}:3000"
    networks:
      - berqenas_net

  postgrest_aqua_beauty:
