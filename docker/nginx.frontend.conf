server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker ic DNS (pg_bridge konteyneri retailex_bridge:3001)
    resolver 127.0.0.11 ipv6=off valid=10s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Tam PG yedek (pg_dump) uzun sürebilir — genel /api zaman aşımından ayrı
    location = /api/pg_dump {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $pg_bridge_upstream retailex_bridge:3001;
        proxy_pass http://$pg_bridge_upstream;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_buffering off;
    }

    # Tarayici: getBridgeUrl() = aynı origin → /api/* → Hono pg_bridge (PostgREST degil)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $pg_bridge_upstream retailex_bridge:3001;
        proxy_pass http://$pg_bridge_upstream;
        proxy_read_timeout 120s;
    }

    # Baileys WhatsApp köprüsü — backoffice QR paneli (/__wa_bridge/status)
    location = /__wa_bridge {
        return 301 /__wa_bridge/;
    }
    location /__wa_bridge/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://retailex_whatsapp_bridge:3000/;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # Ella e-ticaret teması (~83MB) — build/eticaret-static/ella
    location /eticaret-static/ {
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Online mağaza SPA: /magaza/* ve /shop/*
    location ~ ^/(magaza|shop)(/|$) {
        try_files $uri $uri/ /index.html;
    }

    # Gizli e-ticaret yönetimi — yalnızca /mgz URL'si
    location ~ ^/mgz(/|$) {
        try_files $uri $uri/ /index.html;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
