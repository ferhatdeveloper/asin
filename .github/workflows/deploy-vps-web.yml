# main'e push veya "Run workflow" ile: VPS'te git pull + Docker build + frontend + Caddy/api birlestirme.
#
# GitHub → Settings → Secrets and variables → Actions:
#   VPS_HOST          VPS IPv4 veya DNS
#   VPS_USER          SSH kullanici (ornek: root)
#   VPS_SSH_KEY       Ozel anahtar tam metin (-----BEGIN ... PRIVATE KEY-----)
#   VPS_INSTALL_DIR   (istege bagli) Bos ise /opt/berqenas-cloud
#
# VPS on kosul: /opt/berqenas-cloud/projects/retailex/database/scripts/berqenas-deploy-web.sh
#   (ilk kurulum: database/VPS_RETAIL_EX_VE_EXFINPDKS_KURULUM.md — bolum 5.2)
#
# authorized_keys: VPS_USER hesabina, VPS_SSH_KEY'in public karsiligi eklenmis olmali.

name: Deploy web to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: SSH — pull, build, yeniden baslat
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -euo pipefail
            echo "=== GitHub Actions deploy: ${{ github.repository }} @ ${{ github.sha }} ==="
            INSTALL_DIR="${{ secrets.VPS_INSTALL_DIR }}"
            if [[ -z "${INSTALL_DIR// }" ]]; then
              INSTALL_DIR="/opt/berqenas-cloud"
            fi
            export INSTALL_DIR
            export RETAILEX_GIT_URL="https://github.com/${{ github.repository }}.git"
            export RETAILEX_GIT_BRANCH="main"
            export RETAILEX_PUBLIC_DOMAIN="retailex.app"
            DEPLOY="${INSTALL_DIR}/projects/retailex/database/scripts/berqenas-deploy-web.sh"
            if [[ ! -f "$DEPLOY" ]]; then
              echo "Hata: $DEPLOY yok. VPS'te ilk kurulumu tamamlayin." >&2
              exit 1
            fi
            chmod +x "$DEPLOY"
            bash "$DEPLOY"
