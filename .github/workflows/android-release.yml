name: Android App Release

# RetailEX React Native / Expo Android APK (mobile/)
# Capacitor / kök android/ DEĞİL — bkz. .cursor/rules/retailex-mobile-react-native.mdc
# Tetikleme:
#   git tag android-v0.1.224 && git push origin android-v0.1.224
# veya Actions → "Android App Release" → Run workflow
# veya: npm run android:ci:build

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Read package version
        working-directory: .
        run: |
          v=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$v" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ] && [[ "${{ github.ref }}" == refs/tags/android-v* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=android-v$v" >> "$GITHUB_ENV"
          fi

      - name: Sync mobile app version
        working-directory: .
        run: node scripts/sync-mobile-version.mjs

      - name: Install mobile dependencies
        run: npm ci

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --non-interactive

      - name: Build debug APK (unsigned CI)
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Collect APK artifact
        working-directory: .
        run: |
          APK_SRC=$(find mobile/android/app/build/outputs/apk -name '*.apk' | head -n 1)
          if [ -z "$APK_SRC" ] || [ ! -f "$APK_SRC" ]; then
            echo "APK bulunamadı"
            find mobile/android/app/build/outputs -type f -ls || true
            exit 1
          fi
          APK_DST="AsinERP-Android-${PACKAGE_VERSION}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> "$GITHUB_ENV"
          ls -la "$APK_DST"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AsinERP-Android-${{ env.PACKAGE_VERSION }}
          path: AsinERP-Android-${{ env.PACKAGE_VERSION }}.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: AsinERP Android ${{ env.PACKAGE_VERSION }}
          body: |
            AsinERP Android APK (**React Native / Expo** — `mobile/`)

            **Sürüm:** ${{ env.PACKAGE_VERSION }}
            **Dosya:** `AsinERP-Android-${{ env.PACKAGE_VERSION }}.apk`
            **Not:** İmza secret yokken CI **debug** APK üretir (`assembleDebug`). EAS alternatifleri (`mobile/eas.json`): profil `debug` ≈ bu CI; `preview` = dahili APK; `production` = Play AAB. Ayrıntı: `mobile/README.md` → EAS Build.

            Kurulum: APK’yı cihaza aktarıp yükleyin (bilinmeyen kaynaklara izin gerekebilir).
          files: AsinERP-Android-${{ env.PACKAGE_VERSION }}.apk
          draft: false
          prerelease: false
