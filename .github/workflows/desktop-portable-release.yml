name: Desktop Portable Release

# AsinERP taşınabilir Windows (USB flash) — kurulum yok, data exe yanında
# Tetikleme:
#   git tag portable-v0.1.228 && git push origin portable-v0.1.228
# veya: npm run desktop:ci:portable
# veya Actions → "Desktop Portable Release" → Run workflow

on:
  push:
    tags:
      - 'portable-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-portable:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read package version
        shell: pwsh
        run: |
          $v = node -p "require('./package.json').version"
          echo "PACKAGE_VERSION=$v" >> $env:GITHUB_ENV
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref }}" -like "refs/tags/portable-v*") {
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $env:GITHUB_ENV
          } else {
            echo "RELEASE_TAG=portable-v$v" >> $env:GITHUB_ENV
          }
          $zip = "AsinERP-Portable-$v.zip"
          echo "PORTABLE_ZIP=$zip" >> $env:GITHUB_ENV
          Write-Host "Sürüm=$v Tag=$env:RELEASE_TAG Zip=$zip"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Verify Rust toolchain
        shell: pwsh
        run: rustc --version

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './DeskApp -> target'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Disable Windows code signing (portable CI)
        shell: pwsh
        run: |
          echo "WINDOWS_CODESIGN_DISABLE=1" >> $env:GITHUB_ENV
          Write-Host "Portable CI: WINDOWS_CODESIGN_DISABLE=1"

      - name: Build Tauri portable (no NSIS)
        shell: pwsh
        env:
          CI: 'true'
          CARGO_BUILD_JOBS: '2'
          CARGO_INCREMENTAL: '0'
          WINDOWS_CODESIGN_DISABLE: '1'
          ASIN_PORTABLE: '1'
          SKIP_VERIFY_INSTALLER_SIGNATURE: '1'
        run: |
          npm run prebuild
          npm run sumatra:fetch
          npm run postgrest:fetch
          node scripts/tauri-windows-signing-prep.mjs
          node scripts/tauri-build-portable-run.mjs

      - name: Pack AsinERP portable zip
        shell: pwsh
        run: node scripts/pack-asin-portable-zip.mjs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AsinERP-Portable-${{ env.PACKAGE_VERSION }}
          path: dist/${{ env.PORTABLE_ZIP }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: AsinERP Portable ${{ env.PACKAGE_VERSION }}
          body: |
            ## AsinERP Taşınabilir (Windows / USB)

            Kurulum gerekmez — zip'i açıp klasörü flash belleğe kopyalayın.

            ### Kullanım
            1. `AsinERP-Portable-${{ env.PACKAGE_VERSION }}.zip` indirin ve açın
            2. Klasörün tamamını USB'ye kopyalayın
            3. `retailex.exe` çalıştırın
            4. Ayarlar / veri: `data\config.db` (exe yanında — flash harfi değişse de kalır)

            `portable.dat` dosyasını silmeyin.

            ### Notlar
            - NSIS kurulumu değildir (ayrı: `app-v*` Desktop App Release)
            - CI imzasız build (`WINDOWS_CODESIGN_DISABLE=1`)
            - Sürüm: `${{ env.PACKAGE_VERSION }}` (kök `package.json`)
            - WebView2 Runtime gerekir
          files: dist/${{ env.PORTABLE_ZIP }}
          draft: false
          prerelease: false
          make_latest: false
          generate_release_notes: false
